<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#4c1d95,#1e3a8a,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* CARD MODERNO */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:24px;
padding:30px;
box-shadow:0 20px 80px rgba(0,0,0,0.8);
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

/* BADGE */

.badge{
background:linear-gradient(90deg,#f59e0b,#ef4444);
padding:8px 18px;
border-radius:50px;
font-size:12px;
font-weight:bold;
display:inline-block;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(239,68,68,0.6);
}

/* TITULO */

.brand{
font-size:38px;
font-weight:900;
background:linear-gradient(90deg,#facc15,#f97316,#ef4444);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

/* SUB */

.subtitle{
font-size:14px;
color:#cbd5f5;
margin-bottom:20px;
}

/* PREÇO */

.price-box{
background:rgba(0,0,0,0.4);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}

.old{
text-decoration:line-through;
color:#94a3b8;
font-size:14px;
}

.new{
font-size:46px;
font-weight:900;
color:#22c55e;
margin-top:5px;
text-shadow:0 0 15px rgba(34,197,94,0.7);
}

/* LISTA */

.list{
text-align:left;
margin-bottom:25px;
}

.list div{
margin-bottom:10px;
font-size:14px;
}

/* BOTÃO SUPER */

.cta{
display:block;
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:900;
text-decoration:none;
color:#022c22;
box-shadow:0 15px 60px rgba(34,197,94,0.8);
transition:0.3s;
}

.cta:hover{
transform:scale(1.07);
box-shadow:0 20px 80px rgba(34,197,94,1);
}

/* ALERTA */

.timer{
background:rgba(239,68,68,0.15);
color:#fca5a5;
padding:12px;
border-radius:10px;
font-size:13px;
margin-top:15px;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#94a3b8;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="badge">🔥 PROMOÇÃO ATIVA</div>

<div class="brand">MEGA FEIRÃO</div>

<div class="subtitle">
Desconto liberado por tempo limitado
</div>

<div class="price-box">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 79,97</div>
</div>

<div class="list">
<div>✔ Desconto exclusivo liberado</div>
<div>✔ Acesso imediato</div>
<div>✔ Suporte prioritário</div>
</div>

<a class="cta" href="https://eichbergsolinger-del.github.io/megapromocoesaproveite2026/inicio/">
GARANTIR AGORA →
</a>

<div class="timer">
⚠ Restam poucas vagas disponíveis
</div>

<div class="footer">
🔒 Compra segura • Pagamento protegido
</div>

</div>

</div>

</body>
</html>
